name: Deploy VitePress to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build VitePress
        run: pnpm run build
        env:
          # 既然你用二级域名访问，BASE 必须是根路径 /
          BASE_PATH: /

      - name: Fix Custom Domain
        # 这行非常关键！它确保每次部署都会告诉 GitHub 你的域名是什么
        # 否则 Actions 部署可能会冲掉仓库设置里的域名
        run: echo "blog.1224hj.top" > .vitepress/dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.vitepress/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
