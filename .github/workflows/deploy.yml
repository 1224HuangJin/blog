name: Deploy Blog to Subfolder

on:
  push:
    branches:
      - main

permissions:
  contents: write  # 必须有写入权限，因为它要往 gh-pages 分支塞东西

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install & Build
        run: |
          pnpm install
          pnpm run build
        env:
          # 强制告诉构建工具，资源的路径前缀是 /blog/
          BASE_PATH: /blog/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .vitepress/dist      # 博客编译出来的文件夹
          target-folder: blog          # 重点：把内容放在主站的 blog 文件夹下
          branch: gh-pages             # 部署到这个分支
          clean: true                  # 只清理 blog 文件夹内部，不影响根目录
