name: Deploy Blog to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Build
        run: |
          pnpm install
          # 依然注入 /blog/ 变量，确保子路径可用
          BASE_PATH=/blog/ pnpm run build

      - name: Add CNAME
        # 这一步是把你的域名写进打包后的文件夹，防止每次部署后域名失效
        run: echo "blog.1224hj.top" > .vitepress/dist/CNAME

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .vitepress/dist
          target-folder: blog  # 将博客放在主站的 /blog 目录下
          branch: gh-pages
          clean: true
